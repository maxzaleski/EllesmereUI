name: Locale keys up to date

# Anti-rot gate for the translation system: when source strings change, the
# committed Locales/_keys.txt must be regenerated so translators always see the
# current key list. This job fails the PR if it is stale.

on:
  pull_request:
    paths:
      - '**/*.lua'
      - 'Locales/_keys.txt'
      - '.tools/extract-locale-keys.sh'

jobs:
  locale-keys:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate the locale key list
        run: bash .tools/extract-locale-keys.sh

      - name: Fail if Locales/_keys.txt is out of date
        run: |
          if ! git diff --quiet -- Locales/_keys.txt; then
            echo "::error::Locales/_keys.txt is out of date. Run .tools/extract-locale-keys.sh and commit the result."
            git --no-pager diff -- Locales/_keys.txt
            exit 1
          fi
          echo "Locales/_keys.txt is current ($(grep -cvE '^#' Locales/_keys.txt) keys)."
